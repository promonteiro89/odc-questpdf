name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test (build + 21 tests)
        run: dotnet test tests/OutSystems.QuestPdf.Tests -c Release

      - name: Package for ODC (publish linux-x64 + zip, verify native engine)
        run: bash build/generate_upload_package.sh

      - name: Upload ODC external-library package
        uses: actions/upload-artifact@v4
        with:
          name: ExternalLibrary_net8.0
          path: ExternalLibrary_net8.0.zip
          if-no-files-found: error
